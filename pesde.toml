name = "utterlyterrible/anderson_robotics"
version = "0.0.1"
description = "Development repo for Research Complex 05"
authors = ["UtterlyTerrible"]
repository = "https://github.com/utterlyterrible/anderson-robotics"

[target]
environment = "roblox"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"

[dependencies]
knit = { wally = "sleitnick/knit", version = "^1.7.0" }
component = { wally = "sleitnick/component", version = "^2.4.8" }
vide = { name = "centau/vide", version = "^0.4.0" }
charm = { wally = "littensy/charm", version = "^0.11.0-rc.5" }
charm-sync = { wally = "littensy/charm-sync", version = "^0.4.0-rc.7" }
vide-charm = { wally = "littensy/vide-charm", version = "^0.4.0-rc.5" }
ui-labs = { wally = "pepeeltoro41/ui-labs", version = "^2.4.2" }
typed-promise = { wally = "howmanysmall/typed-promise", version = "^4.0.6" }
janitor = { wally = "howmanysmall/janitor", version = "^1.18.3" }
conch = { name = "alicesaidhi/conch", version = "^0.4.0-rc.6" }
conch-ui = { wally = "alicesaidhi/conch-ui", version = "^0.4.0-rc.7" }
lyra = { wally = "paradoxum-games/lyra", version = "^0.6.0" }
